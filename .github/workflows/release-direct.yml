name: Release (Direct Distribution)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build and sign but do not create a GitHub Release'
        required: true
        default: true
        type: boolean

concurrency:
  group: release-direct
  cancel-in-progress: false

permissions:
  contents: write

env:
  SCHEME: photo-export
  PROJECT: photo-export.xcodeproj
  APP_NAME: "Photo Export"
  XCODE_PATH: /Applications/Xcode_16.2.app

jobs:
  build-sign-notarize:
    runs-on: macos-15
    environment: direct-release
    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Determine build context
        id: ctx
        run: |
          echo "::group::Build context"
          IS_TAG="false"
          VERSION="0.0.0-dev"
          IS_DRY_RUN="true"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            IS_TAG="true"
            VERSION="${GITHUB_REF#refs/tags/v}"
            IS_DRY_RUN="false"
            echo "Tag push detected: v${VERSION}"
          else
            IS_DRY_RUN="${{ github.event.inputs.dry_run }}"
            echo "workflow_dispatch detected (dry_run=${IS_DRY_RUN})"
          fi

          echo "is_tag=${IS_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_dry_run=${IS_DRY_RUN}" >> "$GITHUB_OUTPUT"

          echo "is_tag=${IS_TAG}"
          echo "version=${VERSION}"
          echo "is_dry_run=${IS_DRY_RUN}"
          echo "::endgroup::"

      # ── Xcode selection ───────────────────────────────────────────────
      - name: Select Xcode
        run: |
          echo "::group::Xcode selection"
          echo "Selecting Xcode at ${XCODE_PATH}..."
          sudo xcode-select -s "${XCODE_PATH}"
          echo "Active Xcode path: $(xcode-select -p)"
          xcodebuild -version
          echo "Swift version: $(swift --version 2>&1 | head -1)"
          echo "::endgroup::"

      # ── Keychain setup ────────────────────────────────────────────────
      - name: Create temporary keychain
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "::group::Keychain setup"

          KEYCHAIN_PATH="${RUNNER_TEMP}/release.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "Creating temporary keychain at ${KEYCHAIN_PATH}..."
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          echo "Configuring keychain settings (no auto-lock)..."
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"

          echo "Unlocking keychain..."
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          echo "Adding keychain to search list..."
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')

          echo "Decoding and importing Developer ID certificate..."
          CERT_PATH="${RUNNER_TEMP}/certificate.p12"
          echo "${CERTIFICATE_P12_BASE64}" | base64 --decode > "${CERT_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "${CERT_PATH}"

          echo "Setting key partition list for codesign access..."
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"

          echo "Storing notarytool credentials in keychain..."
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --keychain "${KEYCHAIN_PATH}"

          echo "Verifying certificate was imported:"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

          # Export for later steps
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "$GITHUB_ENV"

          echo "Keychain setup complete."
          echo "::endgroup::"

      # ── Archive ───────────────────────────────────────────────────────
      - name: Archive Release build
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "::group::Archive"
          ARCHIVE_PATH="${RUNNER_TEMP}/photo-export.xcarchive"

          echo "Archiving Release build..."
          echo "  ARCHS=arm64"
          echo "  CODE_SIGN_STYLE=Manual"
          echo "  CODE_SIGN_IDENTITY=Developer ID Application"
          echo "  DEVELOPMENT_TEAM=${APPLE_TEAM_ID}"
          echo "  KEYCHAIN_PATH=${KEYCHAIN_PATH}"

          set -o pipefail
          xcodebuild archive \
            -project "${PROJECT}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -destination 'platform=macOS' \
            -archivePath "${ARCHIVE_PATH}" \
            ARCHS=arm64 \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Developer ID Application" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            "OTHER_CODE_SIGN_FLAGS=--keychain ${KEYCHAIN_PATH}" \
            2>&1 | tail -30

          echo ""
          echo "Archive created at: ${ARCHIVE_PATH}"
          echo "Archive size: $(du -sh "${ARCHIVE_PATH}" | cut -f1)"
          ls -la "${ARCHIVE_PATH}/Products/Applications/"

          echo "ARCHIVE_PATH=${ARCHIVE_PATH}" >> "$GITHUB_ENV"
          echo "::endgroup::"

      # ── Export ─────────────────────────────────────────────────────────
      - name: Export archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "::group::Export"
          EXPORT_PATH="${RUNNER_TEMP}/export"

          echo "Creating ExportOptions.plist..."
          cat > "${RUNNER_TEMP}/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          PLIST

          echo "ExportOptions.plist contents:"
          cat "${RUNNER_TEMP}/ExportOptions.plist"

          echo ""
          echo "Exporting archive..."
          xcodebuild -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist" \
            -exportPath "${EXPORT_PATH}"

          echo ""
          echo "Export contents:"
          ls -la "${EXPORT_PATH}/"

          APP_PATH="${EXPORT_PATH}/${APP_NAME}.app"
          if [ ! -d "${APP_PATH}" ]; then
            echo "ERROR: Expected app bundle not found at ${APP_PATH}"
            echo "Available items:"
            find "${EXPORT_PATH}" -maxdepth 2 -type d
            exit 1
          fi

          echo "App bundle found: ${APP_PATH}"
          echo "App bundle size: $(du -sh "${APP_PATH}" | cut -f1)"

          echo "Verifying code signature..."
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          echo "Code signature valid."

          echo "EXPORT_PATH=${EXPORT_PATH}" >> "$GITHUB_ENV"
          echo "APP_PATH=${APP_PATH}" >> "$GITHUB_ENV"
          echo "::endgroup::"

      # ── Create DMG ────────────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          echo "::group::DMG creation"
          DMG_NAME="PhotoExport-${{ steps.ctx.outputs.version }}-arm64.dmg"
          DMG_PATH="${RUNNER_TEMP}/${DMG_NAME}"

          echo "Creating DMG: ${DMG_NAME}..."
          # create-dmg does not accept a --keychain flag; codesign resolves the
          # identity from the user keychain search list configured earlier.
          create-dmg \
            --volname "${APP_NAME}" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 160 \
            --icon "${APP_NAME}.app" 180 170 \
            --hide-extension "${APP_NAME}.app" \
            --app-drop-link 480 170 \
            --codesign "Developer ID Application" \
            "${DMG_PATH}" \
            "${APP_PATH}"

          echo "DMG created: ${DMG_PATH}"
          echo "DMG size: $(du -sh "${DMG_PATH}" | cut -f1)"

          echo "Verifying DMG signature..."
          codesign --verify --verbose=2 "${DMG_PATH}"
          echo "DMG signature valid."

          echo "DMG_PATH=${DMG_PATH}" >> "$GITHUB_ENV"
          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"
          echo "::endgroup::"

      # ── Notarize & Staple ─────────────────────────────────────────────
      - name: Notarize DMG
        run: |
          echo "::group::Notarization"
          echo "Submitting DMG for notarization..."
          echo "This may take several minutes."

          xcrun notarytool submit "${DMG_PATH}" \
            --keychain-profile "notarytool-profile" \
            --keychain "${KEYCHAIN_PATH}" \
            --wait \
            --timeout 30m

          echo ""
          echo "Notarization complete. Stapling ticket to DMG..."
          xcrun stapler staple "${DMG_PATH}"

          echo "Verifying stapled DMG..."
          xcrun stapler validate "${DMG_PATH}"
          echo "Staple validation passed."

          echo ""
          echo "Running spctl assessment on DMG..."
          spctl --assess --type open --context context:primary-signature --verbose=2 "${DMG_PATH}" || true

          echo ""
          echo "Mounting DMG to verify app inside..."
          MOUNT_POINT="${RUNNER_TEMP}/dmg-mount"
          hdiutil attach "${DMG_PATH}" -mountpoint "${MOUNT_POINT}" -nobrowse
          echo "Mounted DMG contents:"
          ls -la "${MOUNT_POINT}/"

          echo "Running spctl assessment on app bundle..."
          spctl --assess --type execute --verbose=2 "${MOUNT_POINT}/${APP_NAME}.app" || true

          echo "Detaching DMG..."
          hdiutil detach "${MOUNT_POINT}"

          echo "Notarization and stapling complete."
          echo "::endgroup::"

      # ── Checksums ─────────────────────────────────────────────────────
      - name: Compute checksums
        run: |
          echo "::group::Checksums"
          CHECKSUM_FILE="${RUNNER_TEMP}/${DMG_NAME}.sha256"

          echo "Computing SHA-256 checksum..."
          cd "$(dirname "${DMG_PATH}")"
          shasum -a 256 "$(basename "${DMG_PATH}")" | tee "${CHECKSUM_FILE}"

          echo "CHECKSUM_FILE=${CHECKSUM_FILE}" >> "$GITHUB_ENV"
          echo "::endgroup::"

      # ── Upload artifacts (every run) ──────────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: ${{ env.DMG_PATH }}

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksum
          path: ${{ env.CHECKSUM_FILE }}

      # ── GitHub Release (tag pushes only) ──────────────────────────────
      - name: Create draft GitHub Release
        if: steps.ctx.outputs.is_tag == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::group::GitHub Release"
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Creating draft release for tag: ${TAG}"

          gh release create "${TAG}" \
            --draft \
            --title "${APP_NAME} ${TAG}" \
            --generate-notes \
            "${DMG_PATH}" \
            "${CHECKSUM_FILE}"

          echo "Draft release created. Visit the GitHub Releases page to review and publish."
          echo "::endgroup::"

      # ── Cleanup (always) ──────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          echo "::group::Cleanup"
          if [ -f "${KEYCHAIN_PATH}" ]; then
            echo "Deleting temporary keychain at ${KEYCHAIN_PATH}..."
            security delete-keychain "${KEYCHAIN_PATH}" || true
            echo "Keychain deleted."
          else
            echo "No temporary keychain found to clean up."
          fi
          echo "::endgroup::"
