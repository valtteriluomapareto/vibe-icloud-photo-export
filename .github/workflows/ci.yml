name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  website:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm ci
        working-directory: website

      - name: Prettier (check)
        run: npm run format:check
        working-directory: website

      - name: oxlint
        run: npm run lint
        working-directory: website

      - name: Validate website
        run: npm run validate
        working-directory: website

  build-and-test:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          echo "::group::Xcode selection"
          echo "Selecting Xcode at /Applications/Xcode_16.2.app"
          sudo xcode-select -s /Applications/Xcode_16.2.app
          echo "Active Xcode path: $(xcode-select -p)"
          xcodebuild -version
          echo "Available SDKs:"
          xcodebuild -showsdks 2>/dev/null | grep macosx
          echo "::endgroup::"

      - name: Install SwiftLint and swift-format
        run: |
          echo "::group::Tool installation"
          echo "Installing swiftlint and swift-format via Homebrew..."
          brew install swiftlint swift-format
          echo "SwiftLint version: $(swiftlint version)"
          echo "swift-format version: $(swift-format --version)"
          echo "::endgroup::"

      - name: SwiftLint
        run: |
          echo "Running SwiftLint in strict mode..."
          echo "Config: $(cat .swiftlint.yml | head -5)"
          swiftlint --strict
          echo "SwiftLint passed."

      - name: SwiftFormat (check)
        run: |
          echo "Running swift-format lint on photo-export/..."
          swift-format lint --recursive photo-export
          echo "swift-format lint passed."

      - name: Build Debug
        run: |
          echo "::group::Debug build"
          echo "Building Debug configuration (CODE_SIGNING_ALLOWED=NO)..."
          set -o pipefail
          xcodebuild \
            -project photo-export.xcodeproj \
            -scheme "photo-export" \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -20
          echo "Debug build succeeded."
          echo "::endgroup::"

      - name: Run Unit Tests (Debug, with coverage)
        run: |
          echo "::group::Unit tests"
          echo "Running unit tests with code coverage enabled..."
          set -o pipefail
          xcodebuild \
            -project photo-export.xcodeproj \
            -scheme "photo-export" \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tail -30
          echo "Unit tests passed."
          echo "Result bundle: $(du -sh TestResults.xcresult)"
          echo "::endgroup::"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult

      - name: Convert coverage to LCOV
        run: |
          echo "Converting .xcresult to LCOV format..."
          ./scripts/xccov2lcov.sh TestResults.xcresult lcov.info
          echo "LCOV file size: $(wc -l < lcov.info) lines"

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false

      - name: Build Release
        run: |
          echo "::group::Release build"
          echo "Building Release configuration (CODE_SIGNING_ALLOWED=NO)..."
          set -o pipefail
          xcodebuild \
            -project photo-export.xcodeproj \
            -scheme "photo-export" \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -20
          echo "Release build succeeded."
          echo "::endgroup::"
